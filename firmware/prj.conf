# GPIO Enable
CONFIG_GPIO=y

# SPI Enable (Accel IIM-42352, PSRAM APS6404L)
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y

# I2C Enable (Mag BMM350, Temp TMP112, Battery LTC3335)
CONFIG_I2C=y

# PDM / Audio (MMICT5838 via nrfx PDM)
CONFIG_NRFX_PDM=y

# Floating Point / DSP
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y
CONFIG_CMSIS_DSP=y
CONFIG_NEWLIB_LIBC=y

# LOG Enable
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y

# BLE Config
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="IntelliVibe-BT"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_GATT_NOTIFY_MULTIPLE=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# BLE Buffer Config
CONFIG_BT_BUF_ACL_RX_SIZE=517
CONFIG_BT_BUF_ACL_TX_SIZE=39
CONFIG_BT_BUF_ACL_TX_COUNT=20
CONFIG_BT_L2CAP_TX_MTU=517
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_CTLR_DATA_LENGTH_MAX=39

# Flash / NVS
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_REBOOT=y

# MCUboot / OTA
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU=y
CONFIG_SECURE_BOOT=y

# System
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
